# Provenance: package.json "repository.url" must be the same GitHub repo this
# workflow runs in, or npm returns E422 when verifying the sigstore bundle.
name: release
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
          scope: "@pymthouse"
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Verify package.json repository matches this repo
        run: |
          REPO_URL=$(node -p "require('./package.json').repository.url")
          EXPECTED="https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "$REPO_URL" != "$EXPECTED" ]; then
            echo "::error::package.json repository.url must be ${EXPECTED} for npm provenance (got ${REPO_URL})"
            exit 1
          fi
      - name: Verify NPM_TOKEN is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::secrets.NPM_TOKEN is empty. Add an npm automation token (classic publish or granular write) in repo Settings → Secrets → Actions."
            exit 1
          fi
      - name: Configure registry auth for pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm config set "//registry.npmjs.org/:_authToken" "${NODE_AUTH_TOKEN}"
      - run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if gh release view "${GITHUB_REF_NAME}" -R "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists on ${GITHUB_REPOSITORY}; skipping create."
            exit 0
          fi
          gh release create "${GITHUB_REF_NAME}" \
            -R "${GITHUB_REPOSITORY}" \
            --title "${PKG} v${VER}" \
            --generate-notes \
            --verify-tag
