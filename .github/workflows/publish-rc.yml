# Publishes a unique npm prerelease on each PR update so downstream repos
# (pymthouse, dashboard) can pin `@pymthouse/builder-sdk@<version>` before merge.
#
# npm auth: Trusted Publishing (OIDC). Register this workflow filename on npmjs.com
# alongside release.yml. See docs/RELEASING.md.
name: publish-rc

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: publish-rc-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: true

jobs:
  publish-rc:
    # Fork PRs cannot publish to @pymthouse (OIDC + provenance).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
          scope: "@pymthouse"
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Compute RC version
        id: version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || 'manual' }}
          SHORT_SHA: ${{ github.sha }}
        run: |
          BASE=$(node -p "require('./package.json').version.replace(/-.*/, '')")
          RC_VERSION="${BASE}-rc.pr${PR_NUMBER}.${SHORT_SHA:0:7}"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${RC_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Set package.json version for publish
        run: npm version "${{ steps.version.outputs.rc_version }}" --no-git-tag-version
      - name: Verify package.json repository matches this repo
        run: |
          REPO_URL=$(node -p "require('./package.json').repository.url.replace(/^git\\+/, '')")
          EXPECTED="https://github.com/${GITHUB_REPOSITORY}.git"
          if [ "$REPO_URL" != "$EXPECTED" ]; then
            echo "::error::package.json repository.url must be ${EXPECTED} for npm provenance (got ${REPO_URL})"
            exit 1
          fi
      - name: Install npm CLI for trusted publishing
        run: npm install -g npm@11.5.1
      - name: Publish to npm (dist-tag rc)
        run: npm publish --access public --no-git-checks --tag rc
      - name: Push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RC_VERSION: ${{ steps.version.outputs.rc_version }}
        run: |
          BODY="$(cat <<EOF
          ## \`@pymthouse/builder-sdk\` RC published

          | | |
          | --- | --- |
          | **Version** | \`${RC_VERSION}\` |
          | **Git tag** | \`v${RC_VERSION}\` |
          | **Exact install** | \`npm install @pymthouse/builder-sdk@${RC_VERSION}\` |
          | **Rolling RC tag** | \`npm install @pymthouse/builder-sdk@rc\` |

          Use this in pymthouse/dashboard PRs before \`0.5.0\` ships on \`latest\`.
          EOF
          )"
          gh pr comment "${{ github.event.pull_request.number }}" \
            -R "${{ github.repository}" \
            --body "$BODY"
