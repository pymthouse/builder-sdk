name: bump-version

on:
  workflow_dispatch:
    inputs:
      version:
        description: >
          Semver bump keyword (patch, minor, major, prerelease, …) or an exact
          version (e.g. 2.0.0 or 1.0.0-rc.1). Passed to `pnpm version`.
        required: true
        default: patch
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Bump package version
        env:
          VERSION_BUMP: ${{ inputs.version }}
        run: |
          pnpm version "$VERSION_BUMP" -m "chore: release v%s"
      - name: Push branch and tag
        run: |
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin --tags
